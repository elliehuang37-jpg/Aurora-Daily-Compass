<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Aurora Daily Compass</title>
  <meta name="description" content="Aurora Daily Compass 五大主題金句卡 PWA。">
  <meta name="theme-color" content="#98490A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Aurora Compass">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <style>
    :root {
      --orange: #98490A;
      --green: #0E783F;
      --orange-dark: #813C08;
      --green-dark: #0B5830;
      --ink: #151515;
      --muted: #72746f;
      --line: rgba(255, 255, 255, 0.22);
      --shadow: 0 20px 56px rgba(6, 35, 31, 0.22);
      --bottom: calc(122px + env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(105deg, rgba(243, 107, 22, 0.68) 0%, rgba(255, 218, 72, 0.62) 48%, rgba(40, 184, 91, 0.58) 100%),
        #fff7df;
    }
    button { font: inherit; cursor: pointer; }
    .phone-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,250,0.94) 0%, rgba(248,251,237,0.92) 100%);
      position: relative;
      overflow-x: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 24px 80px rgba(0,0,0,0.12);
    }
    .app { min-height: 100vh; padding: calc(18px + env(safe-area-inset-top)) 16px var(--bottom); }
    .topbar { display: grid; gap: 14px; margin-bottom: 16px; }
    .brand-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 16px; display: grid; place-items: center; flex: 0 0 auto;
      color: var(--orange); background: #fff; box-shadow: 0 10px 28px rgba(152,73,10,0.18);
      border: 1px solid rgba(152,73,10,0.18);
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .brand h1 { margin: 0; font-size: 21px; line-height: 1.05; font-weight: 850; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .counter {
      min-width: 70px; height: 38px; border: 1px solid rgba(20,171,90,0.2); border-radius: 999px;
      background: rgba(255,255,255,0.82); display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      color: var(--green-dark); font-weight: 850; font-size: 13px;
    }
    .intro { border: 1px solid rgba(152,73,10,0.16); border-radius: 18px; padding: 14px; background: rgba(255,255,255,0.72); }
    .intro p { margin: 0; color: #52544f; font-size: 14px; line-height: 1.6; }
    .intro strong { color: var(--orange); }
    .theme-strip { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 7px; padding: 2px 0 8px; }
    .theme-strip::-webkit-scrollbar { display: none; }
    .theme-chip {
      width: 100%; min-height: 36px; border: 1px solid rgba(14,120,63,0.22); border-radius: 999px;
      background: rgba(255,255,255,0.8); color: #41443f; padding: 0 6px;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px; font-size: 13px; font-weight: 800;
    }
    .theme-chip::before { content: none; }
    .theme-icon { width: 19px; height: 19px; display: inline-grid; place-items: center; border-radius: 999px; background: rgba(255,255,255,0.64); font-size: 12px; }
    .theme-chip.active { background: var(--theme); border-color: var(--theme); color: #fff; box-shadow: 0 10px 22px color-mix(in srgb, var(--theme) 32%, transparent); }
    .card-wrap { display: grid; gap: 14px; }

    .theme-pill { display: inline-flex; align-items: center; gap: 6px; color: #fff; font-size: 13px; font-weight: 900; padding: 6px 10px; border-radius: 999px; background: color-mix(in srgb, var(--theme) 86%, rgba(0,0,0,0.18)); box-shadow: 0 8px 20px rgba(0,0,0,0.22); text-shadow: 0 2px 12px rgba(0,0,0,0.42); }
    .card-number { color: rgba(255,255,255,0.88); font-size: 12px; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.72); }
    .card-favorite { min-height: 32px; border: 1px solid rgba(255,255,255,0.34); border-radius: 999px; padding: 0 10px; background: rgba(255,255,255,0.18); color: #fff; backdrop-filter: blur(12px); font-size: 12px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.18); }
    .card-favorite.active { background: rgba(255,255,255,0.92); color: #9d2b20; }
    .quote-content { padding: 34px 0 22px; }
    .quote-title { margin: 0 0 16px; font-size: clamp(24px, 8vw, 36px); line-height: 1.18; font-weight: 900; text-shadow: 0 3px 16px rgba(0,0,0,0.82); }
    .quote-text { margin: 0; font-size: clamp(22px, 7.2vw, 35px); line-height: 1.4; font-weight: 850; white-space: pre-line; text-shadow: 0 3px 18px rgba(0,0,0,0.88); }
    .content-label { display: inline-flex; margin: 24px 0 8px; color: #bfffd6; font-size: 14px; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.75); }
    .quote-reminder { margin: 0; color: rgba(255,255,255,0.94); line-height: 1.7; font-size: 17px; white-space: pre-line; text-shadow: 0 2px 12px rgba(0,0,0,0.82); }
    .reflection-grid { display: grid; gap: 10px; }
    .reflection {
      border: 1px solid rgba(255,255,255,0.22); border-radius: 18px;
      background: rgba(0,0,0,0.24);
      padding: 12px 13px; display: grid; gap: 5px;
    }
    .reflection span { color: #bfffd6; font-size: 14px; font-weight: 900; }
    .reflection p { margin: 0; color: rgba(255,255,255,0.94); line-height: 1.58; font-size: 16px; white-space: pre-line; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
    .journal { border: 1px solid rgba(255,255,255,0.24); border-radius: 18px; background: rgba(255,255,255,0.13); padding: 12px 13px; display: grid; gap: 8px; backdrop-filter: blur(10px); }
    .journal label { color: #fff; font-size: 14px; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.72); }
    .journal textarea { width: 100%; min-height: 84px; resize: vertical; border: 0; border-radius: 14px; padding: 11px 12px; background: rgba(255,255,255,0.9); color: #17322a; font: inherit; font-size: 15px; line-height: 1.55; outline: none; }
    .journal textarea:focus { box-shadow: 0 0 0 3px rgba(80,216,110,0.28); }
    .draw-panel {
      display: grid; gap: 10px; border-radius: 24px; background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 12px 38px rgba(12,45,32,0.10); padding: 12px;
    }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tool-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .btn {
      min-height: 46px; border: 0; border-radius: 16px; background: #fff; color: #242424;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      font-weight: 850; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
    }
    .btn.primary { background: #F36B16; color: #fff; box-shadow: 0 10px 22px rgba(243,107,22,0.26); }
    .btn.green { background: #28B85B; color: #fff; box-shadow: 0 10px 22px rgba(40,184,91,0.24); }
    .btn.icon { min-height: 42px; font-size: 12px; color: #52544f; }
    .btn.active { color: var(--orange); box-shadow: inset 0 0 0 2px rgba(152,73,10,0.46); }
    .status-panel {
      margin-top: 14px; border-radius: 20px; background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,0,0,0.06); padding: 12px 14px; color: #555952; font-size: 13px; line-height: 1.6;
    }
    .status-panel strong { color: var(--green-dark); }
    .bottom-nav {
      position: fixed; left: 50%; bottom: calc(12px + env(safe-area-inset-bottom)); transform: translateX(-50%);
      z-index: 30; width: min(398px, calc(100% - 28px)); border-radius: 999px;
      background: linear-gradient(90deg, rgba(152,73,10,0.13), rgba(14,120,63,0.13)); backdrop-filter: blur(18px); border: 1px solid rgba(152,73,10,0.18);
      box-shadow: 0 18px 52px rgba(0,0,0,0.18); padding: 7px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px;
    }
    .nav-btn { min-height: 42px; border: 0; border-radius: 999px; background: rgba(14,120,63,0.14); color: var(--green-dark); font-size: 13px; font-weight: 850; }
    .nav-btn.active { background: #F36B16; color: #fff; box-shadow: 0 8px 22px rgba(243,107,22,0.32); }
    .toast {
      position: fixed; left: 50%; bottom: calc(82px + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(18px);
      opacity: 0; pointer-events: none; z-index: 40; background: #151515; color: #fff;
      border-radius: 999px; padding: 10px 16px; font-size: 14px; box-shadow: 0 14px 32px rgba(0,0,0,0.22);
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (min-width: 431px) {
      body { padding: 20px 0; }
      .phone-shell { border-radius: 34px; min-height: calc(100vh - 40px); }
      .bottom-nav { width: 390px; }
    }
    @media (max-width: 370px) {
      .app { padding-left: 12px; padding-right: 12px; }
      .quote-card { padding: 18px; min-height: 61vh; }
      .quote-text { font-size: 21px; }
      .action-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div class="app">
      <header class="topbar" id="top">
        <div class="brand-row">
          <div class="brand">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"></circle><path d="m14.7 9.3-1.6 3.8-3.8 1.6 1.6-3.8 3.8-1.6Z"></path></svg>

            <div class="quote-content">

          <div class="tool-row"><button class="btn icon" id="favoriteCard" type="button">🤍 收藏</button><button class="btn icon" id="shareCard" type="button">分享</button><button class="btn icon" id="downloadCard" type="button">下載</button></div>
        </section>

      showToast("已產生金句卡圖片");
    }
    async function shareCanvasImage(canvas, fileName) {
      const blob = await canvasToBlob(canvas);
      if (!blob) throw new Error("canvas export failed");
      const file = new File([blob], fileName, { type: "image/png" });
      if (isMobileDevice() && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "Aurora Daily Compass", text: "送你一張 Aurora Daily Compass 金句卡" });
        showToast("已開啟分享選單");
        return;
      }
      if (navigator.clipboard && window.ClipboardItem) {
        try {
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          showToast("圖片已複製，請貼到 LINE");
          return;
        } catch (error) {}
      }
      await downloadBlob(blob, fileName);
      showToast("已下載圖片，請拖曳到 LINE");
    }
    async function downloadCanvasImage(canvas, fileName) {
      const blob = await canvasToBlob(canvas);
      if (!blob) throw new Error("canvas export failed");
      await downloadBlob(blob, fileName);
    }
    async function saveCanvasImage(canvas, fileName, intent = "download") {
      if (intent === "share") {
        await shareCanvasImage(canvas, fileName);
        return;
      }
      await downloadCanvasImage(canvas, fileName);
    }
    function createCardCanvas() {
      if (!state.currentCard) return Promise.reject(new Error("no card"));
      return new Promise((resolve) => {
        const card = state.currentCard; const theme = themeOf(card); const canvas = document.createElement("canvas"); const scale = 2;
        canvas.width = 1080 * scale; canvas.height = 1350 * scale; const ctx = canvas.getContext("2d"); ctx.scale(scale, scale);
        const bg = new Image(); bg.onload = () => drawCard(bg); bg.onerror = () => drawCard(null); bg.src = AURORA_IMAGE_SRC;
        function drawCard(image) {
        if (image) drawCoverImage(ctx, image, 1080, 1350); else { ctx.fillStyle = "#062b2f"; ctx.fillRect(0, 0, 1080, 1350); }
        ctx.fillStyle = "rgba(255,255,255,0.92)"; ctx.font = "800 34px 'Noto Sans TC', sans-serif"; ctx.fillText(`Aurora Daily Compass · ${theme.name}`, 72, 92);
        ctx.shadowColor = "rgba(0,0,0,0.52)"; ctx.shadowBlur = 14; ctx.shadowOffsetY = 3;
        ctx.fillStyle = "#ffffff"; ctx.font = "900 58px 'Noto Sans TC', sans-serif"; wrapCanvasText(ctx, card.title, 72, 215, 900, 72, 2);
        ctx.font = "900 76px 'Noto Sans TC', sans-serif"; const quoteBottom = wrapCanvasText(ctx, card.quote, 72, 350, 920, 96, 4);
        function drawDownloadSection(label, text, y, maxLines = 2) {
          ctx.fillStyle = "#bfffd6"; ctx.font = "800 39px 'Noto Sans TC', sans-serif"; ctx.fillText(label, 72, y);
          ctx.fillStyle = "#ffffff"; ctx.font = "700 47px 'Noto Sans TC', sans-serif";
          return wrapCanvasText(ctx, text, 252, y, 690, 67, maxLines) + 30;
        }
        let sectionY = Math.max(quoteBottom + 62, 768);
        sectionY = drawDownloadSection("覺察提問", card.question, sectionY, 2);
        sectionY = drawDownloadSection("轉換視角", card.reminder, sectionY, 2);
        sectionY += 118;
        drawDownloadSection("今日行動", card.action, sectionY, 2);
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        ctx.fillStyle = "rgba(255,255,255,0.72)"; ctx.font = "800 26px 'Noto Sans TC', sans-serif"; ctx.fillText("Her Aurora", 72, 1272);
          resolve(canvas);
        }
      });
    }
    async function downloadCurrentCard() {
      if (!state.currentCard) return showToast("請先抽一張卡");
      try { await saveCanvasImage(await createCardCanvas(), `aurora-daily-compass-${state.currentCard.id}.png`, "download"); } catch (error) { showToast("下載失敗，請改用分享或截圖保存"); }
    }
    function bindEvents() {
      nodes.drawAny.addEventListener("click", drawAnyCard); nodes.drawTheme.addEventListener("click", drawThemeCard); nodes.favoriteCard.addEventListener("click", toggleFavorite); nodes.favoriteCardTop.addEventListener("click", toggleFavorite); nodes.cardJournal.addEventListener("input", saveCurrentJournal); nodes.shareCard.addEventListener("click", shareCurrentCard); nodes.downloadCard.addEventListener("click", downloadCurrentCard);
      nodes.themes.addEventListener("click", (event) => { const button = event.target.closest("[data-theme]"); if (!button) return; state.selectedThemeId = button.dataset.theme; renderThemes(); renderProgress(); });
      document.querySelectorAll(".nav-btn").forEach((button) => button.addEventListener("click", () => { document.querySelectorAll(".nav-btn").forEach((item) => item.classList.remove("active")); button.classList.add("active"); document.getElementById(button.dataset.target).scrollIntoView({ behavior: "smooth", block: "start" }); }));
    }
    function boot() { renderThemes(); renderCard(); bindEvents(); if ("serviceWorker" in navigator && location.protocol !== "file:") navigator.serviceWorker.register("./sw.js").catch(() => {}); }
    boot();
  </script>
